name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  linux:
    name: Linux
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        include:
          # - lto_flag: ""
          #   label: bun-webkit-linux-amd64-debug
          #   os: big-ubuntu
          #   package_json_arch: "x64"
          #   CMAKE_BUILD_TYPE: "Debug"
          # - lto_flag: ""
          #   label: bun-webkit-linux-arm64-debug
          #   os: linux-arm64
          #   package_json_arch: "arm64"
          #   CMAKE_BUILD_TYPE: "Debug"
          # - lto_flag: "-flto='full'"
          #   label: bun-webkit-linux-arm64-lto
          #   os: linux-arm64
          #   package_json_arch: "arm64"
          #   CMAKE_BUILD_TYPE: "Release"
          # - lto_flag: ""
          #   label: bun-webkit-linux-arm64
          #   os: linux-arm64
          #   package_json_arch: "arm64"
          #   CMAKE_BUILD_TYPE: "Release"
          # - lto_flag: "-flto='full'"
          #   label: bun-webkit-linux-amd64-lto
          #   os: big-ubuntu
          #   package_json_arch: "x64"
          #   CMAKE_BUILD_TYPE: "Release"
          # - lto_flag: ""
          #   label: bun-webkit-linux-amd64
          #   os: big-ubuntu
          #   package_json_arch: "x64"
          #   CMAKE_BUILD_TYPE: "Release"
          - lto_flag: ""
            label: bun-webkit-linux-riscv64
            os: riscv64/ubuntu
            package_json_arch: "riscv64"
            CMAKE_BUILD_TYPE: "Release"

    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !LayoutTests/
            !JSTests/
      - uses: docker/setup-buildx-action@v2
        id: buildx
        with:
          install: true
      - name: Run
        run: |
          rm -rf ${{runner.temp}}/bun-webkit ${{runner.temp}}/bun-webkit.tar.gz
          WEBKIT_RELEASE_TYPE=${{matrix.CMAKE_BUILD_TYPE}} CPU="native" cpu=native LTO_FLAG=${{matrix.lto_flag}} temp=${{runner.temp}} bash release.sh
          cd ${{runner.temp}}
          echo "#define BUN_WEBKIT_VERSION \"${{github.sha}}\"" >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "${{matrix.label}}", "version": "0.0.1-${{github.sha}}", "os": ["linux"], "cpu": ["${{matrix.package_json_arch}}"], "repository": "https://github.com/${{github.repository}}" }' > bun-webkit/package.json
          rm -rf bun-webkit/lib/*.so
          rm -rf bun-webkit/lib/*.so.*
          tar -czf bun-webkit.tar.gz bun-webkit
          rm -rf bun-webkit
      - uses: actions/upload-artifact@v3
        with:
          name: ${{matrix.label}}
          path: ${{runner.temp}}/bun-webkit.tar.gz

  release:
    name: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - linux
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: bun-webkit-linux-riscv64
          path: ${{runner.temp}}/bun-webkit-linux-riscv64
      - uses: actions/download-artifact@v3
        with:
          name: bun-webkit-linux-riscv64
          path: ${{runner.temp}}/bun-webkit-linux-riscv64

      - name: Rename files
        run: |
          mv ${{runner.temp}}/bun-webkit-linux-riscv64/bun-webkit.tar.gz ${{runner.temp}}/bun-webkit-linux-riscv64.tar.gz
      
      - name: Release
        uses: softprops/action-gh-release@v1
        id: release
        with:
          generate_release_notes: true
          tag_name: "autobuild-${{github.sha}}"
          files: |
            ${{runner.temp}}/bun-webkit-linux-riscv64-debug.tar.gz
